services:
  - type: web
    name: requalitrace-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: OPENAI_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false

staticSites:
  - name: requalitrace-frontend
    environment: node
    buildCommand: "cd frontend && npm install && npx ng build"
    publishPath: "frontend/dist/frontend"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
